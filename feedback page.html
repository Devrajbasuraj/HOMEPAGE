    <main>
        <section class="about-section">
            
            <div class="col">
            <h1>FEEDBACK</h1>
            </div>
            <form id="feedbackForm">
                <label for="name">Name:</label> <br>
                <input type="text" id="name" name="name" class="name" placeholder="Enter Your Name"><br><br>
                <label for="mobileNumber">Mobile Number:</label><br>
                <input type="text" id="mobileNumber" name="mobileNumber" class="number" placeholder="Enter Your Number"><br><br>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" class="mail" placeholder="Enter Your Email"><br><br>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" class="message" placeholder="Enter Your Message"></textarea><br><br>
              <center> <input type="submit" value="Submit" class="submit-btn" onclick="submitFeedback()"></center> 
              </form>
            </section>
            </body>

    </main>
           <script>
// script.js
function submitFeedback() {
  // Get the input fields
  const name = document.getElementById('name').value;
  const mobileNumber = document.getElementById('mobileNumber').value;
  const email = document.getElementById('email').value;
  const message = document.getElementById('message').value;

  // Check if the fields are empty
  if (name === '' || mobileNumber === '' || email === '' || message === '') {
    // Display a popup message asking to fill the fields
    alert('Please fill required fields');
  } else {
    // Display a popup message for successful submission
    alert('Feedback submitted successfully');
  }
}
           </script>
