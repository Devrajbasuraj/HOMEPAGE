<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
   
    <title>Single Product Page  </title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="product1.css">
    
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="products.html"><i class="fa fa-arrow-left" aria-hidden="true"></i></li></a>
                <li><a href="HOMEPAGE.html"><i class="fa fa-home" aria-hidden="true"></i></li></ul></a>
                              
        </nav>
         </header>
    <div class="container">
        <div class="single-product">
            <div class="row">
                <div class="col-6">
                    <div class="product-image">
                        <div class="product-image-main">
                            <img src="itachi.jpeg" alt="" id="product-main-image">
                        </div>
                        
                    </div>
                </div>
                
                    <div class="product">
                        <div class="product-title">
                            <h2>ITACHI JAPAN special edition jersey</h2>
                        </div>
                        <div class="product-rating">
                            <span><i class="bx bxs-star"></i></span>
                            <span><i class="bx bxs-star"></i></span>
                            <span><i class="bx bxs-star"></i></span>
                            <span><i class="bx bxs-star"></i></span>
                            <span><i class="bx bxs-star"></i></span>
                            <span class="review">(85 sold)</span>
                        </div>
                        <div class="product-price">
                            <span class="offer-price">850.00rs</span>
                            <span class="sale-price">1000.00</span>
                        </div>

                        <div class="product-details">
                            <h3>Description</h3>
                            <p>Buy [Premium Quality] japan team jersey with collaboration with anime naruto PREMIUM WITH BADGES online in India</p>
                        </div>
                        <div class="product-size">
                            <h4>Size</h4>
                            <div class="size-layout">
                                <input type="radio" name="size" value="S" id="1" class="size-input">
                                <label for="1" class="size">S</label>

                                <input type="radio" name="size" value="M" id="2" class="size-input">
                                <label for="2" class="size">M</label>

                                <input type="radio" name="size" value="L" id="3" class="size-input">
                                <label for="3" class="size">L</label>

                                <input type="radio" name="size" value="XL" id="4" class="size-input">
                                <label for="4" class="size">XL</label>
                               </div>
                        </div>
                        
                        <span class="divider"></span>

                        <div class="product-btn-group">
                            <a href="feedback14.html"><div class="button buy-now"><i class='bx bxs-zap' ></i> Buy Now</div></a>
                            
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    </div>
   

</body>
</html>
